name: TextTraits CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Static syntax checks
        run: |
          python -m py_compile texttraits_app/app.py texttraits_app/storage.py
          node --check texttraits_app/static/app.js

      - name: Database migration smoke
        run: python scripts/migrate.py

      - name: App and security regression tests
        run: |
          python tests/smoke_test.py
          python tests/browser_smoke_test.py
          python tests/accessibility_smoke_test.py
          python tests/production_smoke_test.py
          python tests/security_regression_test.py
          python tests/security_attack_harness.py
          python tests/config_regression_test.py
          python tests/frontend_regression_test.py
          python tests/env_storage_regression_test.py
          python tests/readiness_regression_test.py
          python scripts/security_audit.py
