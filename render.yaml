services:
  - type: web
    name: texttraits
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn texttraits_app.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: ENABLE_DEV_TOOLS
        value: false
      - key: TEXTTRAITS_ALLOW_DEMO
        value: false
